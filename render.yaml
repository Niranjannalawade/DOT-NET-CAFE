services:
  - type: web
    name: cybercafe-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cybercafe-db
          property: connectionString

databases:
  - name: cybercafe-db
    databaseName: cybercafe
    user: cybercafe_user
